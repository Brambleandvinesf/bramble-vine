<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Bramble &amp; Vine — Loading Checklist</title>
<style>
  :root{
    --bg:#0a0a0a; --panel:#121212; --panel2:#181818;
    --lime:#7cff00; --lime-dim:rgba(124,255,0,.35);
    --text:#e8e8e8; --muted:#8f8f8f; --line:#2a2a2a;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0; background:var(--bg); color:var(--text);
    font-family:'Courier New', Courier, monospace;}
  body{padding-bottom:96px;}

  /* ---- header ---- */
  header{position:sticky; top:0; z-index:10; background:var(--bg);
    border-bottom:1px solid var(--line); padding:14px 16px 10px;}
  .h-title{color:var(--lime); font-size:20px; font-weight:bold; letter-spacing:2px;}
  .h-sub{display:flex; justify-content:space-between; align-items:baseline;
    font-size:13px; color:var(--muted); margin-top:4px;}
  .h-count{color:var(--text);}
  .h-count b{color:var(--lime);}
  .meter{height:4px; background:var(--panel2); margin-top:10px; border-radius:2px; overflow:hidden;}
  .meter-fill{height:100%; width:0%; background:var(--lime); transition:width .25s ease;}

  /* ---- client groups ---- */
  .client{margin:18px 12px 0;}
  .client-head{display:flex; align-items:baseline; gap:10px; padding:0 4px 8px;}
  .client-name{color:var(--lime); font-size:16px; font-weight:bold; letter-spacing:1px;}
  .client-count{font-size:12px; color:var(--muted); margin-left:auto;}

  .rows{background:var(--panel); border:1px solid var(--line); border-radius:10px; overflow:hidden;}

  /* ---- item row ---- */
  .item{display:flex; align-items:center; gap:14px; min-height:60px;
    padding:12px 14px; border-bottom:1px solid var(--line); cursor:pointer;
    user-select:none;}
  .item:last-child{border-bottom:none;}
  .item:active{background:var(--panel2);}
  .box{flex:0 0 28px; height:28px; border:2px solid var(--lime-dim); border-radius:6px;
    display:flex; align-items:center; justify-content:center;
    font-size:20px; color:var(--bg); background:transparent; transition:all .12s ease;}
  .item.done .box{background:var(--lime); border-color:var(--lime);}
  .item-main{flex:1; min-width:0;}
  .item-name{font-size:15px; line-height:1.35; word-wrap:break-word;}
  .item.done .item-name{color:var(--muted); text-decoration:line-through;}
  .item-meta{font-size:12px; color:var(--muted); margin-top:3px;}
  .item-notes{font-size:12px; color:var(--lime-dim); color:rgba(124,255,0,.55);
    margin-top:3px; line-height:1.35;}
  .tag-onsite{display:inline-block; font-size:10px; letter-spacing:1px; color:var(--bg);
    background:var(--muted); border-radius:3px; padding:1px 6px; margin-left:6px;
    vertical-align:1px;}

  /* ---- empty / error states ---- */
  .state{margin:40px 20px; text-align:center; color:var(--muted); font-size:14px; line-height:1.6;}
  .state b{color:var(--lime);}

  /* ---- Go bar ---- */
  .gobar{position:fixed; left:0; right:0; bottom:0; z-index:20;
    background:linear-gradient(transparent, var(--bg) 30%); padding:18px 14px 16px;}
  .gobtn{width:100%; min-height:56px; font-family:inherit; font-size:18px; font-weight:bold;
    letter-spacing:3px; color:var(--bg); background:var(--lime); border:none; border-radius:10px;
    cursor:pointer;}
  .gobtn:disabled{background:var(--panel2); color:var(--muted); letter-spacing:2px;}
  .gobtn:active:not(:disabled){transform:scale(.985);}
  .gostatus{text-align:center; font-size:12px; color:var(--muted); margin-top:6px; min-height:15px;}
  .gostatus.ok{color:var(--lime);}
</style>
</head>
<body>

<header>
  <div class="h-title">LOADING CHECKLIST</div>
  <div class="h-sub">
    <span id="today-date"></span>
    <span class="h-count"><b id="n-done">0</b> / <span id="n-total">0</span> loaded</span>
  </div>
  <div class="meter"><div class="meter-fill" id="meter"></div></div>
</header>

<main id="list"></main>
<div class="state" id="state" style="display:none"></div>

<div class="gobar">
  <button class="gobtn" id="go">ALL LOADED — GO! &#128656;</button>
  <div class="gostatus" id="gostatus"></div>
</div>

<script>
/* ================= CONFIG =================
   SCRIPT_URL : Apps Script Web App (reads + writes, runs as Brandon)
   GO_WEBHOOK : Make "Loading Complete" webhook
   Set LIVE:false to fall back to baked-in demo data.
============================================ */
const CONFIG = {
  LIVE: true,   // false = run on baked-in demo data, no reads or writes
  SCRIPT_URL: 'https://script.google.com/macros/s/AKfycbwZlJn9jKzzYfcFglDmVGV3l-FTYib0D3mNdILivsB1477aMym68NViDCwia26_JH4siQ/exec',
  GO_WEBHOOK: 'https://hook.us2.make.com/1drj7x1w9lq1gmllzenfm875ni4s8cir'
};

/* Demo rows: today's clients from the 7/15 export */
const DEMO_DATA = [
  {row:36,  client:'Barbara & Larry', project:'proj-3',  item:'Weed wacker',            qty:'', size:'', notes:'', loaded:false},
  {row:37,  client:'Barbara & Larry', project:'proj-6',  item:'Rose and Flower Food',   qty:'', size:'', notes:'Rose - 1/mo - I-M; Bougainvillea - 1/mo O-M', loaded:false},
  {row:120, client:'Jean Steadman',   project:'proj-2',  item:'Stump & Vine - onsite',  qty:'', size:'', notes:'', loaded:false},
  {row:121, client:'Jean Steadman',   project:'proj-4',  item:'Iron',                   qty:'', size:'', notes:'', loaded:false},
  {row:203, client:'Marieke',         project:'proj-7',  item:'Vinegar',                qty:'', size:'', notes:'', loaded:false},
  {row:204, client:'Marieke',         project:'proj-7',  item:'Mask',                   qty:'', size:'', notes:'', loaded:false},
  {row:205, client:'Marieke',         project:'proj-8',  item:'Separate and propagate once suckers have rooted', qty:'', size:'', notes:'', loaded:false},
  {row:206, client:'Marieke',         project:'proj-14', item:'Ladder - onsite',        qty:'', size:'', notes:'', loaded:false},
  {row:207, client:'Marieke',         project:'proj-17', item:"Dial n' Spray prepped with insecticidal soap - onsite", qty:'', size:'', notes:'', loaded:false},
  {row:208, client:'Marieke',         project:'proj-18', item:'Sluggo - onsite',        qty:'', size:'', notes:'', loaded:false}
];

let ITEMS = [];

/* ---------- data layer ---------- */
async function loadData(){
  if(!CONFIG.LIVE){ ITEMS = DEMO_DATA; return; }
  const d = await (await fetch(CONFIG.SCRIPT_URL + '?action=getData')).json();
  const clients = new Set((d.clients||[]).map(c=>String(c||'').trim()).filter(Boolean));
  ITEMS = (d.tools||[]).map(t=>({row:t.row, materialId:t['Material ID']||'',
      client:String(t['Client Name']||'').trim(), project:t['Project ID']||'',
      item:String(t['Item Name']||''), qty:t['Quantity']||'', size:t['Size']||'',
      notes:t['Notes']||'', loaded:t['Loaded Status']===true}))
    .filter(it => it.item && clients.has(it.client));
}

async function writeLoaded(it){
  if(!CONFIG.LIVE || !CONFIG.SCRIPT_URL) return; // no writes in demo mode
  try{
    await fetch(CONFIG.SCRIPT_URL, {method:'POST', mode:'no-cors',
      headers:{'Content-Type':'text/plain'},
      body: JSON.stringify({action:'setLoaded', materialId:it.materialId||'', row:it.row, loaded:it.loaded})});
  }catch(e){ console.error('write failed', e); }
}

/* ---------- render ---------- */
function esc(s){ const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

function render(){
  const list = document.getElementById('list');
  list.innerHTML = '';
  const byClient = {};
  ITEMS.forEach(it => (byClient[it.client] = byClient[it.client] || []).push(it));

  if(!ITEMS.length){
    const st = document.getElementById('state');
    st.style.display = 'block';
    st.innerHTML = 'Nothing to load.<br><b>Truck is ready.</b>';
  }

  Object.keys(byClient).forEach(client => {
    const rowsHtml = byClient[client].map(it => {
      const onsite = /-\s*onsite/i.test(it.item);
      const name = esc(it.item.replace(/\s*-\s*onsite\s*$/i,''))
                 + (onsite ? '<span class="tag-onsite">ONSITE</span>' : '');
      const meta = [it.qty, it.size, it.project].filter(Boolean).join(' · ');
      return '<div class="item' + (it.loaded ? ' done':'') + '" data-row="' + it.row + '">'
        + '<div class="box">&#10003;</div>'
        + '<div class="item-main"><div class="item-name">' + name + '</div>'
        + (meta ? '<div class="item-meta">' + esc(meta) + '</div>' : '')
        + (it.notes ? '<div class="item-notes">' + esc(it.notes) + '</div>' : '')
        + '</div></div>';
    }).join('');
    list.insertAdjacentHTML('beforeend',
      '<section class="client"><div class="client-head">'
      + '<span class="client-name">' + esc(client) + '</span>'
      + '<span class="client-count">' + byClient[client].length + ' item'
      + (byClient[client].length===1?'':'s') + '</span></div>'
      + '<div class="rows">' + rowsHtml + '</div></section>');
  });
  updateCounts();
}

function updateCounts(){
  const done = ITEMS.filter(i=>i.loaded).length, total = ITEMS.length;
  document.getElementById('n-done').textContent = done;
  document.getElementById('n-total').textContent = total;
  document.getElementById('meter').style.width = total ? (100*done/total)+'%' : '0%';
}

/* ---------- interactions ---------- */
document.getElementById('list').addEventListener('click', e => {
  const el = e.target.closest('.item'); if(!el) return;
  const it = ITEMS.find(i => i.row === +el.dataset.row); if(!it) return;
  it.loaded = !it.loaded;
  el.classList.toggle('done', it.loaded);
  updateCounts();
  writeLoaded(it);
});

document.getElementById('go').addEventListener('click', async () => {
  const btn = document.getElementById('go'), st = document.getElementById('gostatus');
  const left = ITEMS.filter(i=>!i.loaded).length;
  if(left && !confirm(left + ' item' + (left===1?'':'s') + ' not checked. Go anyway?')) return;
  btn.disabled = true; st.textContent = 'Sending…'; st.className = 'gostatus';
  try{
    if(CONFIG.GO_WEBHOOK){
      await fetch(CONFIG.GO_WEBHOOK, {method:'POST', mode:'no-cors',
        headers:{'Content-Type':'text/plain'},
        body: JSON.stringify({event:'loading_complete', ts:new Date().toISOString()})});
    }
    st.textContent = 'Loading complete — navigation sent. \u{1F331}'; st.className = 'gostatus ok';
  }catch(e){
    st.textContent = 'Webhook failed — try again.';
  }
  setTimeout(()=>{ btn.disabled = false; }, 4000);
});

/* ---------- boot ---------- */
document.getElementById('today-date').textContent =
  new Date().toLocaleDateString('en-US',{weekday:'long', month:'short', day:'numeric'});
loadData().then(render).catch(err => {
  const st = document.getElementById('state');
  st.style.display='block';
  st.textContent = 'Could not load checklist data. Check connection and reload.';
  console.error(err);
});
</script>
</body>
</html>
