<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Visit Confirmations</title>
<style>
  :root { --lime:#7cff00; --dim:rgba(124,255,0,.55); --panel:#121212; --line:#2a2a2a; }
  body { background:#0a0a0a; color:var(--lime); font-family:'Courier New',monospace; margin:0; padding:16px; }
  h1 { font-size:1.2rem; border-bottom:1px solid var(--lime); padding-bottom:8px; }
  .card { background:var(--panel); border:1px solid var(--lime); border-radius:6px; padding:12px; margin:14px 0; }
  .meta { font-size:.85rem; opacity:.85; margin-bottom:8px; }
  .badge { border:1px solid var(--lime); border-radius:4px; padding:1px 6px; font-size:.75rem; margin-left:6px; }
  textarea, select { width:100%; box-sizing:border-box; background:#0a0a0a; color:var(--lime);
             border:1px solid #4a7a1e; border-radius:4px; font-family:inherit; font-size:.95rem; padding:8px; }
  textarea { min-height:84px; }
  select { min-height:56px; }
  .row { display:flex; gap:8px; margin-top:10px; flex-wrap:wrap; }
  button { background:var(--lime); color:#000; border:none; border-radius:4px; padding:14px 18px;
           font-family:inherit; font-weight:bold; font-size:.95rem; min-height:56px; cursor:pointer; }
  button.ghost { background:transparent; color:var(--lime); border:1px solid var(--lime); }
  button:disabled { opacity:.4; }
  .done { opacity:.5; }
  #status { font-size:.85rem; min-height:1.2em; margin-top:6px; }
  .warn { color:#ffb03f; }
  /* YES gate */
  #gate { position:fixed; inset:0; background:#0a0a0a; display:flex; flex-direction:column;
          align-items:center; justify-content:center; gap:28px; padding:24px; text-align:center; }
  #gate h2 { font-size:1.6rem; margin:0; line-height:1.4; }
  #gate button { font-size:1.4rem; padding:22px 64px; min-height:72px; }
  #gate .sub { font-size:.9rem; opacity:.8; min-height:1.2em; }
  .hidden { display:none !important; }
  .spin::after { content:''; display:inline-block; animation:dots 1.2s steps(4,end) infinite; }
  @keyframes dots { 0%{content:''} 25%{content:'.'} 50%{content:'..'} 75%{content:'...'} }
</style>
</head>
<body>

<div id="gate" class="hidden">
  <h2>Is next week's<br>schedule ready?</h2>
  <button id="yesBtn">YES</button>
  <div class="sub" id="gateStatus"></div>
</div>

<h1>Visit Confirmations</h1>
<div class="row" style="margin:4px 0 0">
  <button id="addBtn" class="ghost">+ New message</button>
  <button id="reloadBtn" class="ghost">Reload</button>
</div>

<div id="addPanel" class="card hidden">
  <div class="meta"><b>New message</b> — delivery uses the client's confirmation preference</div>
  <select id="addClient"><option value="">Choose a client…</option></select>
  <textarea id="addText" placeholder="Message…" style="margin-top:8px"></textarea>
  <div class="row">
    <button id="addSend">Add to queue</button>
    <button id="addCancel" class="ghost">Cancel</button>
  </div>
</div>

<div id="list">Loading…</div>
<div id="status"></div>

<script>
/* ============ CONFIG ============ */
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwZlJn9jKzzYfcFglDmVGV3l-FTYib0D3mNdILivsB1477aMym68NViDCwia26_JH4siQ/exec";
const ACTION_URL = "https://hook.us2.make.com/f63ii4kvvdbqjrl8ze9ceblnd8gfbb4i";   // Scenario B: send/skip/save
const DRAFT_URL  = "https://hook.us2.make.com/qd58recowfo5knfojgkxuldhqrvhk128";   // Scenario A: draft next week
const TOKEN      = "bv7x2K9mQe4TpW8rLzV3";
/* ================================ */

let CLIENTS = [];
let POLL = null;
let LAST_YES = "";   // ISO stamp set server-side by clearQueue (v3.5+)

async function fetchQueue() {
  const r = await fetch(SCRIPT_URL + "?action=getQueue").then(x => x.json());
  CLIENTS = r.clients || [];
  LAST_YES = r.lastYes || "";
  fillClientPicker();
  return r.queue || [];
}

/* Week key = Monday of that week, LA time. Gate is due once per key. */
function weekKey(d) {
  const la = new Date(d.toLocaleString("en-US", { timeZone: "America/Los_Angeles" }));
  la.setHours(0, 0, 0, 0);
  la.setDate(la.getDate() - ((la.getDay() + 6) % 7));   // back to Monday
  return la.getFullYear() + "-" + (la.getMonth() + 1) + "-" + la.getDate();
}
function yesThisWeek() {
  if (!LAST_YES) return false;
  const d = new Date(LAST_YES);
  return !isNaN(d) && weekKey(d) === weekKey(new Date());
}

async function loadQueue(opts) {
  opts = opts || {};
  try {
    const rows = await fetchQueue();
    const pending = rows.filter(r => {
      const s = String(r.status || "").trim().toLowerCase();
      return s === "" || s === "pending";
    });
    /* gate only if there's been no YES yet this week */
    const gateDue = !yesThisWeek() &&
                    (opts.forceGate || (!pending.length && !opts.noGate));
    if (gateDue) { showGate(); return; }
    hideGate();
    render(pending);
    return pending.length;
  } catch (e) {
    document.getElementById("list").textContent = "Couldn't reach the queue — check connection and Reload.";
    return 0;
  }
}

function render(pending) {
  const list = document.getElementById("list");
  if (!pending.length) { list.textContent = "No pending messages. \u2713"; return; }
  list.innerHTML = "";
  pending.forEach(r => {
    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML =
      "<div class='meta'><b>" + esc(r.client || "(no client)") + "</b>" +
      (r.visitDate ? " — " + esc(r.visitDate) : "") +
      "<span class='badge'>" + esc(r.method || "Text") + "</span>" +
      (r.contact ? " · " + esc(r.contact) : " · <span class='warn'>no contact!</span>") + "</div>" +
      "<textarea>" + esc(r.draft) + "</textarea>" +
      "<div class='row'>" +
        "<button data-a='send'>Send</button>" +
        "<button data-a='save' class='ghost'>Save edit</button>" +
        "<button data-a='skip' class='ghost'>Skip</button>" +
      "</div>";
    card.querySelectorAll("button").forEach(b => b.onclick = () => act(card, r, b.dataset.a));
    list.appendChild(card);
  });
}

async function act(card, row, action) {
  const text = action === "skip" ? "" : card.querySelector("textarea").value;
  if (action === "send" && !row.contact && !confirm("No contact on this row — send anyway?")) return;
  card.querySelectorAll("button").forEach(b => b.disabled = true);
  try {
    const res = await fetch(ACTION_URL, {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ token: TOKEN, eventId: row.eventId, action, text })
    });
    if (!res.ok) throw new Error(res.status);
    if (action === "save") {
      card.querySelectorAll("button").forEach(b => b.disabled = false);
      flash("Saved.");
    } else card.classList.add("done");
  } catch (e) {
    card.querySelectorAll("button").forEach(b => b.disabled = false);
    flash("Action failed — try again.", true);
  }
}

/* ---------- YES gate ---------- */
function showGate() { document.getElementById("gate").classList.remove("hidden"); }
function hideGate() { document.getElementById("gate").classList.add("hidden"); }

document.getElementById("yesBtn").onclick = async function () {
  const btn = this, gs = document.getElementById("gateStatus");
  btn.disabled = true;
  gs.innerHTML = "Drafting messages<span class='spin'></span>";
  gs.classList.add("spin");
  try {
    await fetch(DRAFT_URL, {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ token: TOKEN, source: "visits-yes" })
    });
  } catch (e) { /* Make often blocks CORS reads; the trigger still fires */ }
  let tries = 0;
  POLL = setInterval(async () => {
    tries++;
    const n = await loadQueue({ noGate: true });
    if (n > 0) { clearInterval(POLL); hideGate(); }
    else if (tries >= 36) {  // ~3 min
      clearInterval(POLL);
      gs.classList.remove("spin");
      gs.innerHTML = "<span class='warn'>Still drafting — tap Reload above in a moment.</span>";
      btn.disabled = false;
      hideGate(); render([]);
    }
  }, 5000);
};

/* ---------- Add message ---------- */
function fillClientPicker() {
  const sel = document.getElementById("addClient");
  if (sel.options.length > 1) return;
  CLIENTS.forEach(c => {
    const o = document.createElement("option");
    o.value = c.name; o.textContent = c.name;
    sel.appendChild(o);
  });
}

document.getElementById("addBtn").onclick = () =>
  document.getElementById("addPanel").classList.toggle("hidden");
document.getElementById("addCancel").onclick = () =>
  document.getElementById("addPanel").classList.add("hidden");

document.getElementById("addSend").onclick = async function () {
  const client = document.getElementById("addClient").value;
  const text = document.getElementById("addText").value.trim();
  if (!client) { flash("Choose a client.", true); return; }
  if (!text)   { flash("Write a message.", true); return; }
  this.disabled = true;
  try {
    const res = await fetch(SCRIPT_URL, {
      method: "POST", headers: { "Content-Type": "text/plain" },  // text/plain avoids CORS preflight
      body: JSON.stringify({ action: "addMessage", client, text })
    }).then(x => x.json());
    if (!res.ok) throw new Error(res.error || "failed");
    flash(res.contact ? "Queued via " + res.method + " to " + res.contact
                      : "Queued — but no contact found for this client!", !res.contact);
    document.getElementById("addText").value = "";
    document.getElementById("addPanel").classList.add("hidden");
    await loadQueue({ noGate: true });
  } catch (e) { flash("Couldn't add — try again.", true); }
  this.disabled = false;
};

/* ---------- misc ---------- */
document.getElementById("reloadBtn").onclick = async function () {
  this.disabled = true;
  this.innerHTML = "Loading<span class='spin'></span>";
  try { await loadQueue({ noGate: true }); } catch (e) {}
  this.textContent = "Reload";
  this.disabled = false;
};
function flash(msg, warn) {
  const s = document.getElementById("status");
  s.innerHTML = warn ? "<span class='warn'>" + esc(msg) + "</span>" : esc(msg);
  setTimeout(() => { if (s.textContent === msg) s.textContent = ""; }, 6000);
}
function esc(s) { return String(s ?? "").replace(/[&<>"]/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;" }[c])); }

/* ?gate=1 = weekly-gated entry (Glide embed): gate only if no YES yet this
   week (LA time, Mon-Sun, server-stamped — applies across all devices);
   otherwise straight to cards. Plain URL self-routes as before, with the
   same weekly suppression. */
loadQueue({ forceGate: new URLSearchParams(location.search).has("gate") });
</script>
</body>
</html>
